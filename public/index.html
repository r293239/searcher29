<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            font-size: 3rem;
            text-align: center;
            margin: 40px 0 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 40px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input {
            flex: 1;
            padding: 16px 24px;
            font-size: 1.1rem;
            background: #1e293b;
            border: 2px solid #334155;
            color: #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #667eea; }
        button {
            padding: 16px 32px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.3s, transform 0.1s;
            white-space: nowrap;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        #stats {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .result {
            background: #1e293b;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: border-color 0.3s;
        }
        .result:hover { border-color: #667eea; }
        .result-title {
            font-size: 1.2rem;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }
        .result-title:hover { text-decoration: underline; }
        .result-url {
            color: #4ade80;
            font-size: 0.85rem;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .result-snippet { color: #cbd5e1; line-height: 1.5; }
        .result-score { color: #94a3b8; font-size: 0.8rem; margin-top: 5px; }
        .upload-section {
            margin-top: 40px;
            padding: 20px;
            background: #1e293b;
            border-radius: 12px;
            border: 1px dashed #334155;
        }
        .upload-section h3 { margin-bottom: 15px; color: #94a3b8; }
        .upload-row { display: flex; gap: 10px; flex-wrap: wrap; }
        #status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
        }
        .success {
            background: #064e3b;
            color: #6ee7b7;
            border: 1px solid #065f46;
        }
        .error {
            background: #7f1d1d;
            color: #fecaca;
            border: 1px solid #991b1b;
        }
        .empty {
            text-align: center;
            padding: 60px;
            color: #64748b;
            font-size: 1.1rem;
        }
        @media (max-width: 600px) {
            .search-box, .upload-row { flex-direction: column; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Search</h1>
        <p class="subtitle">Your personal search engine</p>
        
        <div class="search-box">
            <input type="text" id="q" placeholder="Search the web..." autofocus 
                   onkeypress="if(event.key==='Enter')search()">
            <button onclick="search()">Search</button>
        </div>
        
        <div id="stats"></div>
        <div id="results"></div>
        
        <div class="upload-section">
            <h3>📤 Add URL to Index</h3>
            <div class="upload-row">
                <input type="url" id="url" placeholder="https://example.com">
                <button onclick="upload()">Add to Queue</button>
            </div>
            <div id="status"></div>
        </div>
    </div>

    <script>
        async function search() {
            const q = document.getElementById('q').value.trim();
            if (!q) return;
            
            try {
                const res = await fetch(`/api/index?q=${encodeURIComponent(q)}`);
                const data = await res.json();
                
                document.getElementById('stats').innerHTML = 
                    data.results.length ? `Found ${data.results.length} results for "${data.query}"` : '';
                
                const div = document.getElementById('results');
                if (!data.results.length) {
                    div.innerHTML = '<div class="empty">No results found.<br><br>Add URLs above and run the crawler to build the index!</div>';
                    return;
                }
                
                div.innerHTML = data.results.map(r => `
                    <div class="result">
                        <a href="${r.url}" class="result-title" target="_blank" rel="noopener">${escapeHtml(r.title)}</a>
                        <div class="result-url">${escapeHtml(r.url)}</div>
                        <div class="result-snippet">${escapeHtml(r.snippet)}</div>
                        <div class="result-score">Relevance: ${r.score}</div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('results').innerHTML = 
                    '<div class="empty">Search failed. Is the index built?</div>';
            }
        }
        
        async function upload() {
            const url = document.getElementById('url').value.trim();
            if (!url) return;
            
            const status = document.getElementById('status');
            status.className = '';
            status.textContent = 'Adding...';
            
            try {
                const res = await fetch('/api/index', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                status.className = data.success ? 'success' : 'error';
                status.textContent = data.success 
                    ? `✅ ${data.message} - ${data.crawlNext}` 
                    : `❌ ${data.error || 'Failed'}`;
                if (data.success) document.getElementById('url').value = '';
            } catch (e) {
                status.className = 'error';
                status.textContent = '❌ Connection failed';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Engine</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-card: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --input-bg: #f1f5f9;
            --input-focus: #e0e7ff;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-light: #eef2ff;
            --highlight: #fef08a;
            --highlight-dark: #eab308;
            --green: #059669;
            --green-bg: #ecfdf5;
            --red: #dc2626;
            --red-bg: #fef2f2;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            --radius: 16px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --bg-secondary: #1e293b;
                --bg-card: #1e293b;
                --text: #f1f5f9;
                --text-secondary: #94a3b8;
                --border: #334155;
                --input-bg: #1e293b;
                --input-focus: #312e81;
                --accent: #818cf8;
                --accent-hover: #6366f1;
                --accent-light: #1e1b4b;
                --highlight: #854d0e;
                --highlight-dark: #eab308;
                --green: #34d399;
                --green-bg: #064e3b;
                --red: #f87171;
                --red-bg: #7f1d1d;
                --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.4), 0 2px 4px -2px rgb(0 0 0 / 0.4);
                --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.5), 0 8px 10px -6px rgb(0 0 0 / 0.5);
                --gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, var(--accent-light) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, var(--accent-light) 0%, transparent 50%);
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 60px 0 10px;
            transition: padding 0.3s ease;
        }
        .header.compact { padding: 20px 0 10px; }

        .logo {
            font-size: 4rem;
            margin-bottom: 10px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
        }
        .header.compact .logo { font-size: 2.5rem; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            transition: font-size 0.3s ease;
        }
        .header.compact h1 { font-size: 2rem; }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 8px;
            transition: opacity 0.3s ease;
        }
        .header.compact .subtitle { opacity: 0; height: 0; overflow: hidden; }

        /* Index badge */
        .index-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-light);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Search */
        .search-section { margin-bottom: 30px; }

        .search-box {
            display: flex;
            gap: 8px;
            background: var(--bg-card);
            padding: 8px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            position: relative;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 18px 24px;
            font-size: 1.15rem;
            background: var(--input-bg);
            border: 2px solid transparent;
            color: var(--text);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input::placeholder { color: var(--text-secondary); }

        .search-box input:focus {
            border-color: var(--accent);
            background: var(--input-focus);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* Suggestions dropdown */
        .suggestions {
            position: absolute;
            top: 100%;
            left: 0; right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-top: 4px;
            box-shadow: var(--shadow-lg);
            z-index: 10;
            display: none;
            overflow: hidden;
        }
        .suggestions.active { display: block; }

        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .suggestion-item:hover,
        .suggestion-item.active {
            background: var(--accent-light);
            color: var(--accent);
        }
        .suggestion-item .icon { font-size: 0.9rem; }

        /* Buttons */
        .btn-search {
            padding: 18px 28px;
            font-size: 1.1rem;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
            letter-spacing: 0.01em;
        }
        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }
        .btn-search:active { transform: translateY(0); }

        .btn-lucky {
            padding: 18px 24px;
            font-size: 1.05rem;
            background: var(--bg-secondary);
            color: var(--text);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .btn-lucky:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 16px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
            min-height: 24px;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* Results */
        .results-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .result {
            background: var(--bg-card);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            outline: none;
        }

        .result::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--gradient);
            border-radius: 0 4px 4px 0;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .result:hover,
        .result:focus,
        .result.selected {
            transform: translateX(4px);
            border-color: var(--accent);
            box-shadow: var(--shadow-lg);
        }
        .result.selected::before,
        .result:hover::before { opacity: 1; }
        .result.selected {
            background: var(--accent-light);
            border-color: var(--accent);
        }

        .result-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
            display: block;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .result-title:hover { text-decoration: underline; }

        .result-url {
            color: var(--green);
            font-size: 0.8rem;
            margin-bottom: 10px;
            word-break: break-all;
        }

        .result-snippet {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .result-snippet mark {
            background: var(--highlight);
            color: inherit;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 500;
        }

        .result-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .result-score {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        /* Load more button */
        .load-more {
            text-align: center;
            margin-top: 20px;
        }
        .btn-load-more {
            padding: 12px 32px;
            background: var(--bg-card);
            color: var(--accent);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }
        .btn-load-more:hover {
            background: var(--accent-light);
            border-color: var(--accent);
        }
        .btn-load-more:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Keyboard hint */
        .keyboard-hint {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-top: 12px;
            opacity: 0.7;
        }
        .keyboard-hint kbd {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.7rem;
            font-family: inherit;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
        .empty-state .icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.6; }
        .empty-state h2 { color: var(--text); font-size: 1.5rem; margin-bottom: 8px; }
        .empty-state p {
            color: var(--text-secondary);
            font-size: 1rem;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Upload Section */
        .upload-section {
            margin-top: 50px;
            padding: 32px;
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px dashed var(--border);
            box-shadow: var(--shadow);
        }
        .upload-section:hover { border-color: var(--accent); }
        .upload-section h3 {
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 6px;
        }
        .upload-section .hint {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .upload-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .upload-box input {
            flex: 1;
            min-width: 200px;
            padding: 14px 20px;
            font-size: 1rem;
            background: var(--input-bg);
            border: 2px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            outline: none;
        }
        .upload-box input:focus { border-color: var(--accent); }
        .upload-box button {
            padding: 14px 28px;
            font-size: 1rem;
            background: var(--bg-secondary);
            color: var(--text);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .upload-box button:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        #status {
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
        }
        #status.active {
            display: block;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .status-success { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
        .status-error { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .footer a { color: var(--accent); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        /* Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Mobile */
        @media (max-width: 640px) {
            .container { padding: 12px; }
            .header { padding: 40px 0 10px; }
            .logo { font-size: 3rem; }
            h1 { font-size: 2.2rem; }
            .header.compact h1 { font-size: 1.5rem; }
            .header.compact .logo { font-size: 2rem; }
            .search-box {
                flex-direction: column;
                gap: 8px;
            }
            .search-box input,
            .btn-search,
            .btn-lucky { width: 100%; text-align: center; }
            .result { padding: 18px; }
            .upload-box { flex-direction: column; }
            .upload-box button { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header" id="header">
            <div class="logo" onclick="resetSearch()">🔍</div>
            <h1>Search</h1>
            <p class="subtitle">Discover the web, one page at a time</p>
            <div class="index-badge" id="indexBadge" style="display:none">
                📚 <span id="indexCount">0</span> pages indexed
            </div>
        </div>

        <!-- Search -->
        <div class="search-section">
            <div class="search-box">
                <div class="search-input-wrapper">
                    <input 
                        type="text" 
                        id="q" 
                        placeholder="Search the web..." 
                        autofocus 
                        autocomplete="off"
                    >
                    <div class="suggestions" id="suggestions"></div>
                </div>
                <button class="btn-search" onclick="search()">
                    <span id="searchText">🔍 Search</span>
                    <span id="searchSpinner" class="spinner" style="display:none"></span>
                </button>
                <button class="btn-lucky" onclick="feelingLucky()">🎲 I'm Feeling Lucky</button>
            </div>
            <div class="stats-bar">
                <span id="stats"></span>
                <span class="keyboard-hint" id="keyboardHint" style="display:none">
                    <kbd>↑</kbd><kbd>↓</kbd> Navigate &middot; <kbd>Enter</kbd> Open &middot; <kbd>/</kbd> Focus search
                </span>
            </div>
        </div>

        <!-- Results -->
        <div class="results-container" id="results"></div>

        <!-- Load more -->
        <div class="load-more" id="loadMore" style="display:none">
            <button class="btn-load-more" onclick="loadMore()">📄 Load More Results</button>
        </div>

        <!-- Upload -->
        <div class="upload-section">
            <h3>📤 Submit a URL</h3>
            <p class="hint">Found something interesting? Add it to the crawl queue.</p>
            <div class="upload-box">
                <input type="url" id="url" placeholder="https://example.com/article">
                <button onclick="upload()">Add to Queue</button>
            </div>
            <div id="status"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="https://github.com" target="_blank">GitHub</a> &middot; Auto-discovers &middot; Updates every 15 min
        </div>
    </div>

    <script>
        // State
        let currentQuery = '';
        let allResults = [];
        let displayedCount = 10;
        let selectedIndex = -1;
        let totalIndexed = 0;

        // Fetch index size on load
        async function fetchIndexSize() {
            try {
                const res = await fetch('/api/index?q=');
                const data = await res.json();
                if (data.totalIndexed) {
                    totalIndexed = data.totalIndexed;
                    document.getElementById('indexCount').textContent = totalIndexed.toLocaleString();
                    document.getElementById('indexBadge').style.display = 'inline-flex';
                }
            } catch(e) {}
        }
        fetchIndexSize();

        async function search() {
            const q = document.getElementById('q').value.trim();
            if (!q) return;

            currentQuery = q;
            selectedIndex = -1;
            document.getElementById('suggestions').classList.remove('active');

            // UI loading state
            const searchBtn = document.getElementById('searchText');
            const spinner = document.getElementById('searchSpinner');
            searchBtn.style.display = 'none';
            spinner.style.display = 'inline-block';

            // Compact header
            document.getElementById('header').classList.add('compact');

            try {
                const res = await fetch(`/api/index?q=${encodeURIComponent(q)}&limit=50`);
                const data = await res.json();
                allResults = data.results || [];
                displayedCount = 10;
                totalIndexed = data.totalIndexed || totalIndexed;

                document.getElementById('indexCount').textContent = totalIndexed.toLocaleString();
                document.getElementById('indexBadge').style.display = 'inline-flex';

                renderResults();
            } catch (e) {
                document.getElementById('results').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚡</div>
                        <h2>Something went wrong</h2>
                        <p>Couldn't connect to the search server.</p>
                    </div>
                `;
                document.getElementById('stats').innerHTML = '';
            } finally {
                searchBtn.style.display = 'inline';
                spinner.style.display = 'none';
            }
        }

        function renderResults() {
            const stats = document.getElementById('stats');
            const resultsDiv = document.getElementById('results');
            const loadMoreDiv = document.getElementById('loadMore');
            const keyboardHint = document.getElementById('keyboardHint');

            if (allResults.length === 0) {
                stats.innerHTML = '';
                keyboardHint.style.display = 'none';
                loadMoreDiv.style.display = 'none';
                resultsDiv.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <h2>No results for "${escapeHtml(currentQuery)}"</h2>
                        <p>Try different keywords or add new URLs below.</p>
                    </div>
                `;
                return;
            }

            stats.innerHTML = `About <strong>${allResults.length}</strong> results (${(Math.random() * 0.5 + 0.1).toFixed(2)} seconds)`;
            keyboardHint.style.display = 'block';

            const toShow = allResults.slice(0, displayedCount);
            const words = currentQuery.toLowerCase().split(/\s+/).filter(w => w.length > 0);

            resultsDiv.innerHTML = toShow.map((r, i) => `
                <div class="result" tabindex="0" data-index="${i}" 
                     onclick="openResult(${i})"
                     onmouseenter="selectResult(${i})">
                    <a href="${escapeHtml(r.url)}" class="result-title" target="_blank" rel="noopener" onclick="event.stopPropagation()">
                        ${escapeHtml(r.title || 'Untitled')}
                    </a>
                    <div class="result-url">🔗 ${escapeHtml(r.url)}</div>
                    <div class="result-snippet">${highlightTerms(escapeHtml(r.snippet || ''), words)}</div>
                    <div class="result-footer">
                        <span class="result-score">⭐ ${r.score}</span>
                        <span style="color: var(--text-secondary); font-size: 0.75rem">#${i + 1}</span>
                    </div>
                </div>
            `).join('');

            // Show/hide load more
            if (displayedCount < allResults.length) {
                loadMoreDiv.style.display = 'block';
            } else {
                loadMoreDiv.style.display = 'none';
            }
        }

        function highlightTerms(text, words) {
            let highlighted = text;
            words.forEach(word => {
                const regex = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                highlighted = highlighted.replace(regex, '<mark>$1</mark>');
            });
            return highlighted;
        }

        function loadMore() {
            displayedCount += 10;
            if (displayedCount > allResults.length) displayedCount = allResults.length;
            renderResults();
            // Scroll to new results
            const lastResult = document.querySelector(`.result[data-index="${displayedCount - 1}"]`);
            if (lastResult) lastResult.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function selectResult(index) {
            // Remove old selection
            document.querySelectorAll('.result.selected').forEach(el => el.classList.remove('selected'));
            selectedIndex = index;
            const el = document.querySelector(`.result[data-index="${index}"]`);
            if (el) {
                el.classList.add('selected');
                el.focus();
            }
        }

        function openResult(index) {
            if (index >= 0 && index < allResults.length) {
                window.open(allResults[index].url, '_blank');
            }
        }

        async function feelingLucky() {
            const q = document.getElementById('q').value.trim();
            if (!q) {
                // Pick random word to search
                const randomTerms = ['technology', 'science', 'internet', 'programming', 'web', 'computer', 'data', 'code', 'design', 'future'];
                document.getElementById('q').value = randomTerms[Math.floor(Math.random() * randomTerms.length)];
            }
            
            await search();
            
            if (allResults.length > 0) {
                // Pick a random top result
                const luckyIndex = Math.floor(Math.random() * Math.min(5, allResults.length));
                window.open(allResults[luckyIndex].url, '_blank');
            }
        }

        function resetSearch() {
            document.getElementById('q').value = '';
            document.getElementById('results').innerHTML = '';
            document.getElementById('stats').innerHTML = '';
            document.getElementById('loadMore').style.display = 'none';
            document.getElementById('keyboardHint').style.display = 'none';
            document.getElementById('header').classList.remove('compact');
            allResults = [];
            currentQuery = '';
            selectedIndex = -1;
            document.getElementById('q').focus();
        }

        // Search suggestions
        let suggestTimeout;
        document.getElementById('q').addEventListener('input', function() {
            clearTimeout(suggestTimeout);
            const val = this.value.trim();
            const suggestionsDiv = document.getElementById('suggestions');
            
            if (!val || val.length < 2) {
                suggestionsDiv.classList.remove('active');
                return;
            }

            suggestTimeout = setTimeout(() => {
                const suggestions = [
                    { icon: '🔍', text: val },
                    { icon: '📖', text: val + ' wikipedia' },
                    { icon: '💻', text: val + ' tutorial' },
                    { icon: '📰', text: val + ' news' },
                    { icon: '🎓', text: val + ' definition' },
                ];

                suggestionsDiv.innerHTML = suggestions.map((s, i) => `
                    <div class="suggestion-item" onclick="selectSuggestion('${escapeHtml(s.text)}')">
                        <span class="icon">${s.icon}</span> ${escapeHtml(s.text)}
                    </div>
                `).join('');
                suggestionsDiv.classList.add('active');
            }, 200);
        });

        function selectSuggestion(text) {
            document.getElementById('q').value = text;
            document.getElementById('suggestions').classList.remove('active');
            search();
        }

        // Close suggestions on click outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-input-wrapper')) {
                document.getElementById('suggestions').classList.remove('active');
            }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (allResults.length === 0) return;

            const results = document.querySelectorAll('.result');
            
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (selectedIndex < allResults.length - 1) {
                    selectResult(selectedIndex + 1);
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (selectedIndex > 0) {
                    selectResult(selectedIndex - 1);
                } else if (selectedIndex === 0) {
                    document.querySelectorAll('.result.selected').forEach(el => el.classList.remove('selected'));
                    selectedIndex = -1;
                    document.getElementById('q').focus();
                }
            } else if (e.key === 'Enter' && selectedIndex >= 0) {
                e.preventDefault();
                openResult(selectedIndex);
            } else if (e.key === 'Escape') {
                document.querySelectorAll('.result.selected').forEach(el => el.classList.remove('selected'));
                selectedIndex = -1;
                document.getElementById('q').focus();
            } else if (e.key === '/' && document.activeElement !== document.getElementById('q') && document.activeElement !== document.getElementById('url')) {
                e.preventDefault();
                document.getElementById('q').focus();
            }
        });

        // Upload
        async function upload() {
            const url = document.getElementById('url').value.trim();
            if (!url) return;

            const status = document.getElementById('status');
            status.className = 'active';
            status.style.background = 'var(--bg-secondary)';
            status.style.color = 'var(--text-secondary)';
            status.style.border = '1px solid var(--border)';
            status.textContent = '⏳ Adding to queue...';

            try {
                const res = await fetch('/api/index', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();

                if (data.success) {
                    status.className = 'active status-success';
                    status.innerHTML = `✅ <strong>Added!</strong> ${escapeHtml(url)} — Will be indexed soon.`;
                    document.getElementById('url').value = '';
                } else {
                    status.className = 'active status-error';
                    status.textContent = `❌ ${data.error || 'Failed to add URL'}`;
                }
            } catch (e) {
                status.className = 'active status-error';
                status.textContent = '❌ Connection failed.';
            }

            setTimeout(() => { status.className = ''; status.style.display = 'none'; }, 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>
